[res_pjsip]
; Trunks and static objects from pjsip.conf (file-based)
endpoint=config,pjsip.conf,1
auth=config,pjsip.conf,1
aor=config,pjsip.conf,1
; Dynamic endpoints from database (realtime, lower priority)
endpoint=realtime,ps_endpoints
auth=realtime,ps_auths
aor=realtime,ps_aors
contact=astdb,registrator

[res_pjsip_endpoint_identifier_ip]
; Trunk identification from pjsip.conf first, then DB
identify=config,pjsip.conf,1
identify=realtime,ps_endpoint_id_ips
