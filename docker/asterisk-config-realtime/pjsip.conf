; PJSIP file-based config — only transport, system, global, and trunks stay here.
; All endpoints, auth, and aors are loaded from database via sorcery.conf

[system]
type = system

[global]
type = global

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Trunk to file PBX ---

[trunk-file]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
allow = alaw
direct_media = no
callerid = "Realtime PBX" <8888>
aors = trunk-file-aor

[trunk-file-aor]
type = aor
contact = sip:asterisk-file:5060
qualify_frequency = 30

[trunk-file-identify]
type = identify
endpoint = trunk-file
match = asterisk-file

; --- PSTN Emulator Trunk ---

[pstn-trunk]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
allow = alaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
callerid = "Realtime PBX" <8888>
aors = pstn-trunk-aor

[pstn-trunk-aor]
type = aor
contact = sip:demo-pstn:5060
qualify_frequency = 30

[pstn-trunk-identify]
type = identify
endpoint = pstn-trunk
match = demo-pstn
