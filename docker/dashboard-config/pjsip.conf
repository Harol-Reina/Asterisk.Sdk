[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Sales team ---

[2001]
type = endpoint
context = default
disallow = all
allow = ulaw
allow = alaw
auth = 2001-auth
aors = 2001-aors

[2001-auth]
type = auth
auth_type = userpass
username = 2001
password = demo2001

[2001-aors]
type = aor
max_contacts = 1

