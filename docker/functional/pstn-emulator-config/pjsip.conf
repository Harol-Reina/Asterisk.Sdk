;
; PSTN Emulator — PJSIP config
; Accepts inbound calls from the DUT (Device Under Test) Asterisk
;

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[global]
type = global
max_forwards = 70

[system]
type = system
timer_t1 = 500
timer_b = 32000

; Trust any IP from the Docker network
[dut-identify]
type = identify
endpoint = dut-endpoint
match = 0.0.0.0/0

[dut-endpoint]
type = endpoint
context = from-dut
disallow = all
allow = ulaw,alaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
