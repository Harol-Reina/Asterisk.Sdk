;
; PSTN Emulator Dialplan
; This Asterisk instance emulates an external telephone network.
; Each extension simulates a different carrier behavior.
;

[globals]

[from-dut]
; === Scenario 1: Normal answer — rings 8s, picks up, ~60s call ===
exten => 1001,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Wait(5)
 same => n,Hangup()

; === Scenario 2: Busy — immediate 486 ===
exten => 1002,1,Busy(5)
 same => n,Hangup()

; === Scenario 3: No answer — rings for 30s with inband ringback, never picks up ===
exten => 1003,1,Ringing()
 same => n,Wait(30)
 same => n,Hangup()

; === Scenario 4: Congestion — 503 Service Unavailable ===
exten => 1004,1,Congestion(5)
 same => n,Hangup()

; === Scenario 5: Voicemail — rings 8s, greeting ~20s, then voicemail record ===
exten => 1005,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(vm-intro)
 same => n,Playback(vm-theperson)
 same => n,Playback(vm-isunavail)
 same => n,Playback(vm-leavemsg)
 same => n,Playback(beep)
 same => n,Wait(15)
 same => n,Hangup()

; === Scenario 6: DTMF sender — rings 4 times, then answers and sends DTMF ===
exten => 1006,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(1234#,250,200)
 same => n,Wait(3)
 same => n,Hangup()

; === Scenario 7: IVR menu — rings 8s, intro message, menu ~60s per option ===
exten => 1007,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-weasels)
 same => n,Playback(vm-options)
 same => n(menu),Background(silence/2)
 same => n,WaitExten(10)

exten => 1,1,NoOp(PSTN IVR: Option 1 selected)
 same => n,Playback(digits/1)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(tt-monkeys)
 same => n,Playback(silence/10)
 same => n,Playback(tt-weasels)
 same => n,Wait(5)
 same => n,Hangup()
exten => 2,1,NoOp(PSTN IVR: Option 2 selected)
 same => n,Playback(digits/2)
 same => n,Playback(tt-weasels)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Wait(5)
 same => n,Hangup()
exten => t,1,NoOp(PSTN IVR: Timeout — replay menu)
 same => n,Goto(from-dut,1007,menu)
exten => i,1,NoOp(PSTN IVR: Invalid — replay menu)
 same => n,Goto(from-dut,1007,menu)

; === Scenario 8: Long call — rings 8s, ~2.5min with audio ===
exten => 1008,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Wait(5)
 same => n,Hangup()

; === Scenario 9: Echo — rings 8s, plays intro, echo ~40s, hangup ===
exten => 1009,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Playback(silence/10)
 same => n,Playback(tt-weasels)
 same => n,Playback(silence/10)
 same => n,Playback(tt-monkeys)
 same => n,Wait(5)
 same => n,Hangup()

; === Scenario 10: Short call — rings 3s, answers ~30s with audio ===
exten => 1010,1,Ringing()
 same => n,Wait(3)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Wait(5)
 same => n,Hangup()

; === Catch-all: any other number — ring 8s, answer, ~30s audio ===
exten => _X.,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Playback(tt-weasels)
 same => n,Wait(5)
 same => n,Hangup()
