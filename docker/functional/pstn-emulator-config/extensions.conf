;
; PSTN Emulator Dialplan
; This Asterisk instance emulates an external telephone network.
; Each extension simulates a different carrier behavior.
;

[globals]

[from-dut]
; === Scenario 1: Normal answer — rings 4 times (~8s), then picks up ===
exten => 1001,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(3)
 same => n,Hangup()

; === Scenario 2: Busy — immediate 486 ===
exten => 1002,1,Busy(5)
 same => n,Hangup()

; === Scenario 3: No answer — rings for 30s, never picks up ===
exten => 1003,1,Progress()
 same => n,Ringing()
 same => n,Wait(30)
 same => n,Hangup()

; === Scenario 4: Congestion — 503 Service Unavailable ===
exten => 1004,1,Congestion(5)
 same => n,Hangup()

; === Scenario 5: Voicemail — rings 4 times, then voicemail ===
exten => 1005,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(vm-intro)
 same => n,VoiceMail(1005@default,s)
 same => n,Hangup()

; === Scenario 6: DTMF sender — rings 4 times, then answers and sends DTMF ===
exten => 1006,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(1234#,250,200)
 same => n,Wait(3)
 same => n,Hangup()

; === Scenario 7: IVR menu — rings 4 times, then automated attendant ===
exten => 1007,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n(menu),Background(silence/1)
 same => n,WaitExten(5)

exten => 1,1,NoOp(PSTN IVR: Option 1 selected)
 same => n,Playback(digits/1)
 same => n,Hangup()
exten => 2,1,NoOp(PSTN IVR: Option 2 selected)
 same => n,Playback(digits/2)
 same => n,Hangup()
exten => t,1,NoOp(PSTN IVR: Timeout)
 same => n,Hangup()
exten => i,1,NoOp(PSTN IVR: Invalid)
 same => n,Goto(from-dut,1007,menu)

; === Scenario 8: Long call — rings 4 times, then holds for 60s ===
exten => 1008,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Hangup()

; === Scenario 9: Echo — rings 4 times, then echoes caller audio back ===
exten => 1009,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Echo()

; === Scenario 10: Rings briefly + quick hangup (for missed call / short call tests) ===
exten => 1010,1,Ringing()
 same => n,Wait(3)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Hangup()

; === Catch-all: any other number — ring 4 times, answer and play announcement ===
exten => _X.,1,Ringing()
 same => n,Wait(8)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(5)
 same => n,Hangup()
