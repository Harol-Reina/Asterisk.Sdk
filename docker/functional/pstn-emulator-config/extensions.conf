;
; PSTN Emulator Dialplan
; This Asterisk instance emulates an external telephone network.
; Each extension simulates a different carrier behavior.
;

[globals]

[from-dut]
; === Scenario 1: Normal answer — picks up, plays audio 5s, hangs up ===
exten => 1001,1,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(3)
 same => n,Hangup()

; === Scenario 2: Busy — immediate 486 ===
exten => 1002,1,Busy(5)
 same => n,Hangup()

; === Scenario 3: No answer — rings for 30s, never picks up ===
exten => 1003,1,Progress()
 same => n,Ringing()
 same => n,Wait(30)
 same => n,Hangup()

; === Scenario 4: Congestion — 503 Service Unavailable ===
exten => 1004,1,Congestion(5)
 same => n,Hangup()

; === Scenario 5: Voicemail — answers, records caller message ===
exten => 1005,1,Answer()
 same => n,Wait(1)
 same => n,Playback(vm-intro)
 same => n,VoiceMail(1005@default,s)
 same => n,Hangup()

; === Scenario 6: DTMF sender — answers, sends DTMF digits to caller ===
exten => 1006,1,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(1234#,250,200)
 same => n,Wait(3)
 same => n,Hangup()

; === Scenario 7: IVR menu — automated attendant ===
exten => 1007,1,Answer()
 same => n(menu),Background(silence/1)
 same => n,WaitExten(5)

exten => 1,1,NoOp(PSTN IVR: Option 1 selected)
 same => n,Playback(digits/1)
 same => n,Hangup()
exten => 2,1,NoOp(PSTN IVR: Option 2 selected)
 same => n,Playback(digits/2)
 same => n,Hangup()
exten => t,1,NoOp(PSTN IVR: Timeout)
 same => n,Hangup()
exten => i,1,NoOp(PSTN IVR: Invalid)
 same => n,Goto(from-dut,1007,menu)

; === Scenario 8: Long call — answers and holds for 60s (for CDR/duration tests) ===
exten => 1008,1,Answer()
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Playback(silence/10)
 same => n,Hangup()

; === Scenario 9: Echo — answers and echoes caller audio back ===
exten => 1009,1,Answer()
 same => n,Echo()

; === Scenario 10: Fast answer + quick hangup (for missed call / short call tests) ===
exten => 1010,1,Answer()
 same => n,Wait(1)
 same => n,Hangup()

; === Catch-all: any other number — answer and play announcement ===
exten => _X.,1,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(5)
 same => n,Hangup()
