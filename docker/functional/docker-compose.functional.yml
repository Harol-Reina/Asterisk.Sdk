services:
  asterisk:
    image: andrius/asterisk:21-alpine
    container_name: functional-asterisk
    ports:
      - "5038:5038"
      - "4573:4573"
      - "8088:8088"
    volumes:
      - ./asterisk-config:/etc/asterisk
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 10

  sipp:
    image: ctaloi/sipp
    container_name: functional-sipp
    depends_on:
      asterisk:
        condition: service_healthy
    network_mode: "service:asterisk"
    volumes:
      - ./sipp-scenarios:/sipp-scenarios
    entrypoint: ["sleep", "infinity"]
