services:
  asterisk:
    image: docker-asterisk-file:latest
    container_name: functional-asterisk
    ports:
      - "5038:5038"
      - "4573:4573"
      - "8088:8088"
    volumes:
      - ./asterisk-config/manager.conf:/etc/asterisk/manager.conf:ro
      - ./asterisk-config/ari.conf:/etc/asterisk/ari.conf:ro
      - ./asterisk-config/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk-config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk-config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk-config/queues.conf:/etc/asterisk/queues.conf:ro
      - ./asterisk-config/confbridge.conf:/etc/asterisk/confbridge.conf:ro
      - ./asterisk-config/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk-config/cdr_manager.conf:/etc/asterisk/cdr_manager.conf:ro
      - ./asterisk-config/cel_manager.conf:/etc/asterisk/cel_manager.conf:ro
      - ./asterisk-config/res_parking.conf:/etc/asterisk/res_parking.conf:ro
      - ./asterisk-config/voicemail.conf:/etc/asterisk/voicemail.conf:ro
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 10

  sipp:
    image: ctaloi/sipp
    container_name: functional-sipp
    depends_on:
      asterisk:
        condition: service_healthy
    network_mode: "service:asterisk"
    volumes:
      - ./sipp-scenarios:/sipp-scenarios
    entrypoint: ["sleep", "infinity"]

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: functional-toxiproxy
    ports:
      - "8474:8474"
      - "15038:15038"
    depends_on:
      asterisk:
        condition: service_healthy
