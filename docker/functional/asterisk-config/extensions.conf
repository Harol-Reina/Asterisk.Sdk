[test-functional]
; Basic call (5 seconds)
exten => 100,1,Answer()
 same => n,Wait(5)
 same => n,Hangup()

; AGI test
exten => 200,1,Answer()
 same => n,AGI(agi://${AGI_HOST}:4573/test-script)
 same => n,Hangup()

; ARI Stasis test
exten => 300,1,Answer()
 same => n,Stasis(test-app)
 same => n,Hangup()

; AudioSocket test
exten => 400,1,Answer()
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${AUDIOSOCKET_HOST}:9091)
 same => n,Hangup()

; Queue test
exten => 500,1,Answer()
 same => n,Queue(test-queue)
 same => n,Hangup()

; Conference test
exten => 600,1,Answer()
 same => n,ConfBridge(test-conf)
 same => n,Hangup()

; Echo test
exten => 700,1,Answer()
 same => n,Echo()

; Playback test
exten => 800,1,Answer()
 same => n,Playback(digits/1&digits/2&digits/3)
 same => n,Hangup()

; Recording test
exten => 900,1,Answer()
 same => n,MixMonitor(test-recording.wav)
 same => n,Wait(5)
 same => n,StopMixMonitor()
 same => n,Hangup()

; DTMF SendDTMF burst test
exten => 150,1,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(123456789*#,250,200)
 same => n,Wait(2)
 same => n,Hangup()

; DTMF Read() consumption test
exten => 155,1,Answer()
 same => n,Read(result,,1,,,5)
 same => n,Wait(2)
 same => n,Hangup()

; IVR test — Background + WaitExten
exten => 160,1,Answer()
 same => n(menu),Background(silence/1)
 same => n,WaitExten(5)

; Transfer targets
exten => 161,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

exten => 162,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

exten => 163,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

; IVR menu options (WaitExten targets)
exten => 1,1,NoOp(IVR Option 1)
 same => n,Goto(test-functional,165,1)
exten => 2,1,NoOp(IVR Option 2)
 same => n,Goto(test-functional,166,1)
exten => i,1,NoOp(IVR Invalid)
 same => n,Goto(test-functional,160,menu)
exten => t,1,NoOp(IVR Timeout)
 same => n,Hangup()

exten => 165,1,Answer()
 same => n,Wait(3)
 same => n,Hangup()

exten => 166,1,Answer()
 same => n,Wait(3)
 same => n,Hangup()

; Parking
exten => 750,1,Park(default)

; Voicemail — direct to mailbox 9001 (no ring, just record)
exten => 950,1,Answer()
 same => n,VoiceMail(9001@default,s)
 same => n,Hangup()

; Voicemail — ring then voicemail (3s timeout, then VM)
exten => 951,1,Answer()
 same => n,Wait(3)
 same => n,VoiceMail(9001@default)
 same => n,Hangup()

; Voicemail check (for MWI test)
exten => 952,1,Answer()
 same => n,VoiceMailMain(9001@default,s)
 same => n,Hangup()

; === PSTN Emulator routes ===
; Dial 1001-1010 → routed to pstn-emulator container via trunk
; 1001=answer, 1002=busy, 1003=no-answer, 1004=congestion
; 1005=voicemail, 1006=dtmf, 1007=ivr, 1008=long, 1009=echo, 1010=quick
exten => _100X,1,Dial(PJSIP/${EXTEN}@pstn-trunk,30)
 same => n,Hangup()
exten => 1010,1,Dial(PJSIP/1010@pstn-trunk,30)
 same => n,Hangup()
