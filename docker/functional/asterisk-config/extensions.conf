[test-functional]
; Basic call (5 seconds)
exten => 100,1,Answer()
 same => n,Wait(5)
 same => n,Hangup()

; AGI test
exten => 200,1,Answer()
 same => n,AGI(agi://${AGI_HOST}:4573/test-script)
 same => n,Hangup()

; ARI Stasis test
exten => 300,1,Answer()
 same => n,Stasis(test-app)
 same => n,Hangup()

; AudioSocket test
exten => 400,1,Answer()
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${AUDIOSOCKET_HOST}:9091)
 same => n,Hangup()

; Queue test
exten => 500,1,Answer()
 same => n,Queue(test-queue)
 same => n,Hangup()

; Conference test
exten => 600,1,Answer()
 same => n,ConfBridge(test-conf)
 same => n,Hangup()

; Echo test
exten => 700,1,Answer()
 same => n,Echo()

; Playback test
exten => 800,1,Answer()
 same => n,Playback(digits/1&digits/2&digits/3)
 same => n,Hangup()

; Recording test
exten => 900,1,Answer()
 same => n,MixMonitor(test-recording.wav)
 same => n,Wait(5)
 same => n,StopMixMonitor()
 same => n,Hangup()
