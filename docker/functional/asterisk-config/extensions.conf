[general]
static = yes
writeprotect = no

[globals]

; Integration + functional test context
[default]
; FastAGI integration test — calls back to the host test server on port 4573
exten => 200,1,NoOp(FastAGI Test)
 same => n,AGI(agi://host.docker.internal:4573/test-script)
 same => n,Hangup()

exten => _X.,1,NoOp(Default: ${EXTEN})
 same => n,Answer()
 same => n,Wait(5)
 same => n,Hangup()

; Stasis app for ARI tests
[stasis-test]
exten => _X.,1,NoOp(Stasis: ${EXTEN})
 same => n,Answer()
 same => n,Stasis(test-app)
 same => n,Hangup()

; Queue dialplan for queue functional tests
[queue-test]
exten => _X.,1,NoOp(Queue: ${EXTEN})
 same => n,Answer()
 same => n,Queue(${EXTEN},,,,30)
 same => n,Hangup()

; Echo test
exten => echo,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Functional test context — all tests that originate Local/NNN@test-functional land here
[test-functional]

; ext 100: Answer + Wait — used by MixMonitor (AMI-controlled) and PlayDtmf tests
exten => 100,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()

; ext 150: Answer + SendDTMF — used by DtmfDetectionTests.SendDtmf_MultipleDigits_ShouldFireSequentialEvents
; The ;1 half of Local/150@test-functional executes this dialplan extension.
exten => 150,1,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(123456789*#,250,200)
 same => n,Wait(2)
 same => n,Hangup()

; ext 155: Answer + Read — used by DtmfDetectionTests.DtmfConsumedByRead_ShouldFireDtmfEvent
exten => 155,1,Answer()
 same => n,Read(RESULT,,1,,,5)
 same => n,Wait(2)
 same => n,Hangup()

; ext 500: Queue entry — used by all QueueCallerTests / QueueMemberTests / QueueMetricsTests
exten => 500,1,Answer()
 same => n,Queue(test-queue,,,,30)
 same => n,Hangup()

; ext 600: Answer + Wait — ;1 half for Local channel entering ConfBridge via Application+Data
; Used by BridgeLifecycleTests which originates Application="ConfBridge", Data="test-bridge-NN"
exten => 600,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()

; ext 900: MixMonitor dialplan test — fires Start + Wait(5) + Stop events
; Used by MixMonitorTests.DialplanMixMonitor_ShouldFireStartAndStopEvents
;          and MixMonitorTests.MixMonitor_StartAndStop_ShouldHaveMatchingChannel
exten => 900,1,Answer()
 same => n,MixMonitor(test-${UNIQUEID}.wav)
 same => n,Wait(5)
 same => n,StopMixMonitor()
 same => n,Hangup()

; ext 950: Voicemail entry — used by VoicemailTests
exten => 950,1,Answer()
 same => n,VoiceMail(9001@default)
 same => n,Hangup()
