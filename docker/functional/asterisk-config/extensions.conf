[general]
static = yes
writeprotect = no

[globals]

; Integration + functional test context
[default]
; FastAGI integration test — calls back to the host test server on port 4573
exten => 200,1,NoOp(FastAGI Test)
 same => n,AGI(agi://host.docker.internal:4573/test-script)
 same => n,Hangup()

exten => _X.,1,NoOp(Default: ${EXTEN})
 same => n,Answer()
 same => n,Wait(5)
 same => n,Hangup()

; Stasis app for ARI tests
[stasis-test]
exten => _X.,1,NoOp(Stasis: ${EXTEN})
 same => n,Answer()
 same => n,Stasis(test-app)
 same => n,Hangup()

; Queue dialplan for queue functional tests
[queue-test]
exten => _X.,1,NoOp(Queue: ${EXTEN})
 same => n,Answer()
 same => n,Queue(${EXTEN},,,,30)
 same => n,Hangup()

; Echo test
exten => echo,1,Answer()
 same => n,Echo()
 same => n,Hangup()
