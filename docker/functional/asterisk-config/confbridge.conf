[general]

[default_user]
type = user
announce_user_count = yes

[default_bridge]
type = bridge
max_members = 50
; Disable native bridge optimization so that ConfBridge keeps the same BridgeUniqueid
; even when the participant count transitions from 2 to 3+.  With native bridging enabled
; (the default), Asterisk switches from a native 2-way bridge to a softmix bridge when a
; third participant joins, which fires a new BridgeCreate with a different UUID and makes
; AMI event correlation in tests unreliable.
enable_native_bridge = no
