[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[2000]
type = endpoint
context = test-functional
disallow = all
allow = ulaw
auth = 2000-auth
aors = 2000-aors

[2000-auth]
type = auth
auth_type = userpass
password = 2000
username = 2000

[2000-aors]
type = aor
max_contacts = 1

[sipp-trunk]
type = endpoint
context = test-functional
disallow = all
allow = ulaw
transport = transport-udp
auth = sipp-auth
aors = sipp-aors

[sipp-auth]
type = auth
auth_type = userpass
password = sipp
username = sipp

[sipp-aors]
type = aor
max_contacts = 5
qualify_frequency = 0

; === PSTN Emulator Trunk ===
; Routes calls to the pstn-emulator container (functional-pstn)
[pstn-trunk]
type = endpoint
context = test-functional
disallow = all
allow = ulaw,alaw
direct_media = no
rtp_symmetric = yes
force_rport = yes

[pstn-trunk-identify]
type = identify
endpoint = pstn-trunk
match = functional-pstn
