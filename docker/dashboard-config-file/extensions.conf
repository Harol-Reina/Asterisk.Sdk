[general]
static = yes
writeprotect = no

[default]
; Inbound to queues
exten => 102,1,Answer()
 same => n,Queue(sales2,,,,300)
 same => n,Hangup()

exten => 103,1,Answer()
 same => n,Queue(support2,,,,300)
 same => n,Hangup()

; Conference rooms
exten => 800,1,Answer()
 same => n,MeetMe(800,dM)
 same => n,Hangup()

exten => 801,1,Answer()
 same => n,ConfBridge(801,default_bridge,default_user)
 same => n,Hangup()

; Direct extension dialing (PJSIP)
exten => _4XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => _5XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; Route to realtime PBX extensions via trunk
exten => _2XXX,1,Dial(PJSIP/${EXTEN}@trunk-realtime,30)
 same => n,Hangup()

exten => _3XXX,1,Dial(PJSIP/${EXTEN}@trunk-realtime,30)
 same => n,Hangup()

; Agent login/logout
exten => *11,1,AgentLogin()
exten => *12,1,AgentLogoff()

[from-trunk]
; Incoming calls from the realtime PBX via trunk
exten => _4XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => _5XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()
