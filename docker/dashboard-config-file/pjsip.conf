[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Sales2 team ---

[4001]
type = endpoint
context = default
disallow = all
allow = ulaw
allow = alaw
allow = opus
auth = 4001-auth
aors = 4001-aors

[4001-auth]
type = auth
auth_type = userpass
username = 4001
password = demo4001

[4001-aors]
type = aor
max_contacts = 1

