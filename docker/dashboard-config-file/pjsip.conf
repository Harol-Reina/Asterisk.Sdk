; --- Trunk to realtime PBX ---

[trunk-realtime]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
allow = alaw
allow = opus
transport = transport-udp
direct_media = no
callerid = "File PBX" <9999>

[trunk-realtime-identify]
type = identify
endpoint = trunk-realtime
match = asterisk-realtime
