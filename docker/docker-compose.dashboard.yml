services:
  postgres:
    image: postgres:17-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_DB: asterisk
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: asterisk
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterisk"]
      interval: 5s
      timeout: 3s
      retries: 10

  asterisk-realtime:
    build:
      context: .
      dockerfile: Dockerfile.asterisk-realtime
    container_name: demo-pbx-realtime
    ports:
      - "5038:5038"       # AMI
      - "8088:8088"       # ARI HTTP
      - "5060:5060/udp"   # SIP
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 10

  asterisk-file:
    build:
      context: .
      dockerfile: Dockerfile.asterisk-file
    container_name: demo-pbx-file
    ports:
      - "5039:5038"       # AMI
      - "8089:8088"       # ARI HTTP
      - "5061:5060/udp"   # SIP
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: asterisk-dashboard
    ports:
      - "8080:8080"
    depends_on:
      asterisk-realtime:
        condition: service_healthy
      asterisk-file:
        condition: service_healthy
    environment:
      - DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE=false
      - Auth__Username=admin
      - Auth__Password=admin
      # File-mode PBX (extensions 4XXX/5XXX, queues sales2/support2)
      - Asterisk__Servers__0__Id=pbx-file
      - Asterisk__Servers__0__Hostname=asterisk-file
      - Asterisk__Servers__0__Port=5038
      - Asterisk__Servers__0__Username=dashboard
      - Asterisk__Servers__0__Password=dashboard
      - Asterisk__Servers__0__ConfigMode=File
      # Realtime PBX (extensions 2XXX/3XXX, queues sales/support)
      - Asterisk__Servers__1__Id=pbx-realtime
      - Asterisk__Servers__1__Hostname=asterisk-realtime
      - Asterisk__Servers__1__Port=5038
      - Asterisk__Servers__1__Username=dashboard
      - Asterisk__Servers__1__Password=dashboard
      - Asterisk__Servers__1__ConfigMode=Realtime
      - Asterisk__Servers__1__RealtimeConnectionString=Host=postgres;Database=asterisk;Username=asterisk;Password=asterisk

volumes:
  pgdata:
