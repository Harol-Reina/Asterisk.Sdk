networks:
  sdk-test:
    name: sdk-test-net

services:
  # ── PostgreSQL for Realtime ──
  postgres:
    image: postgres:17-alpine
    container_name: asterisk-sdk-test-db
    networks:
      - sdk-test
    environment:
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: asterisk
      POSTGRES_DB: asterisk
    ports:
      - "15432:5432"
    volumes:
      - ./functional/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterisk"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ── Asterisk (unified image, realtime mode via PostgreSQL) ──
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile.asterisk
    container_name: asterisk-sdk-test
    networks:
      - sdk-test
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "15038:5038"
      - "15088:8088"
    volumes:
      - ./functional/asterisk-config:/etc/asterisk:ro
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show uptime"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── PSTN Emulator (unified image, file-based mode) ──
  pstn-emulator:
    build:
      context: .
      dockerfile: Dockerfile.asterisk
    container_name: asterisk-sdk-test-pstn
    networks:
      - sdk-test
    ports:
      - "15039:5038"
    volumes:
      - ./functional/pstn-emulator-config:/etc/asterisk:ro
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show uptime"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Toxiproxy for network partition tests ──
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: asterisk-sdk-test-toxiproxy
    networks:
      - sdk-test
    ports:
      - "8474:8474"
      - "15138:15038"
    depends_on:
      asterisk:
        condition: service_healthy
