[general]
static = yes
writeprotect = no

[default]
exten => s,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

exten => _X.,1,Answer()
 same => n,Wait(5)
 same => n,Hangup()

[test-functional]
; --- Basic answered call (CDR, Metrics, Concurrency, etc.) ---
exten => 100,1,Answer()
 same => n,Wait(5)
 same => n,Hangup()

; --- DTMF: Answer + SendDTMF (generates DTMF events) ---
exten => 150,1,Answer()
 same => n,Wait(1)
 same => n,SendDTMF(123456789*#,250,200)
 same => n,Wait(2)
 same => n,Hangup()

; --- DTMF: Answer + long wait for PlayDTMF tests ---
exten => 155,1,Answer()
 same => n,Wait(15)
 same => n,Hangup()

; --- IVR menu: Background + WaitExten ---
exten => 160,1,Answer()
 same => n,Background(silence/1)
 same => n,WaitExten(5)
 same => n,Hangup()

; IVR option 1 -> ext 165
exten => 1,1,Goto(test-functional,165,1)
exten => 165,1,Answer()
 same => n,Playback(silence/1)
 same => n,Hangup()

; IVR option 2 -> ext 166
exten => 2,1,Goto(test-functional,166,1)
exten => 166,1,Answer()
 same => n,Playback(silence/1)
 same => n,Hangup()

; IVR transfer targets
exten => 161,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

exten => 162,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

exten => 163,1,Answer()
 same => n,Wait(10)
 same => n,Hangup()

; IVR timeout handler
exten => t,1,Hangup()

; IVR invalid handler
exten => i,1,Goto(test-functional,160,1)

; --- Event ordering / session tests ---
exten => 300,1,Answer()
 same => n,Wait(3)
 same => n,Hangup()

; --- Queue: route caller to test-queue (no pre-Answer — Queue handles it) ---
exten => 500,1,Queue(test-queue,t,,,30)
 same => n,Hangup()

; --- ConfBridge / Bridge / general wait ---
exten => 600,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()

; --- Backpressure / high-event-rate ---
exten => 700,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()

; --- Parking: parkext ---
exten => 750,1,Park()

; --- Recording: MixMonitor in dialplan ---
exten => 900,1,Answer()
 same => n,MixMonitor(/tmp/test-${UNIQUEID}.wav)
 same => n,Wait(5)
 same => n,StopMixMonitor()
 same => n,Hangup()

; --- Voicemail: leave message in mailbox 9001 ---
exten => 950,1,Answer()
 same => n,VoiceMail(9001@default,s)
 same => n,Hangup()

; --- Non-existent / unanswered (CDR FAILED disposition) ---
exten => 999,1,Congestion()
 same => n,Hangup()

; --- Parking slot range (for unpark originate) ---
exten => _75X,1,Answer()
 same => n,Wait(30)
 same => n,Hangup()
