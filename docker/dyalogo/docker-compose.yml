services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dyalogo_root_2024
      MYSQL_USER: dyalogo
      MYSQL_PASSWORD: dyalogo_dev_2024
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - ../../../../dyalogo/db/Esquemas:/docker-entrypoint-initdb.d/ddl:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdyalogo_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --sql-mode=NO_AUTO_VALUE_ON_ZERO
      --max-allowed-packet=256M

  asterisk:
    image: andrius/asterisk:20-alpine
    ports:
      - "5038:5038"   # AMI
      - "4573:4573"   # FastAGI (Java)
      - "4574:4574"   # FastAGI (.NET)
      - "8088:8088"   # ARI HTTP
      - "8089:8089"   # ARI WebSocket
    volumes:
      - ./asterisk-config:/etc/asterisk
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql

volumes:
  mysql-data:
