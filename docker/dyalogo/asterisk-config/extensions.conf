[general]
static = yes
writeprotect = no
autofallthrough = no
clearglobalvars = no

[globals]
; Variables globales del marcador (equivalente a dy_variables_globales.conf en produccion)
DY_IP_AGI_SERVER=host.docker.internal
DY_NOMBRE_CLIENTE=IPcomDev
DY_CANTIDAD_MAXIMA_GANALES_MARCADOR_G=20
DY_SEGUNDOS_TIMBRE_EXTENSIONES_G=10

; FastAGI endpoints
FASTAGI_JAVA=agi://host.docker.internal:4573
FASTAGI_DOTNET=agi://host.docker.internal:4574

; Contexto ejemplo: Marcador sin AMD (patron 1 de produccion — 35 de 57 campañas)
[DyCampanaMarcador_1]
	exten => s,1,Answer()
	exten => s,n,NOOP(Llamada marcador V1 ${DY_MARCADOR_OPCION} ${DY_MARCADOR_IDCLIENTE} ${DY_MARCADOR_TELEFONO_MARCADO} ${DY_MARCADOR_ID_CONTACTO} ${DY_MARCADOR_URL})
	exten => s,n,SIPAddHeader(Call-InfoCAM: sip:\;id_campana=1)
	exten => s,n,SIPAddHeader(Call-InfoURL1: sip:\;url=${DY_MARCADOR_URL1})
	exten => s,n,SIPAddHeader(Call-InfoURL2: sip:\;url=${DY_MARCADOR_URL2})
	exten => s,n,SIPAddHeader(Call-InfoURL3: sip:\;url=${DY_MARCADOR_URL3})
	exten => s,n,SIPAddHeader(Call-InfoURL4: sip:\;url=${DY_MARCADOR_URL4})
	exten => s,n,SIPAddHeader(Call-InfoURL5: sip:\;url=${DY_MARCADOR_URL5})
	exten => s,n,SIPAddHeader(Call-InfoUID: sip:\;uniqueid=${UNIQUEID})
	exten => s,n,SIPAddHeader(Call-AccDef: sip:\;accion=cola_acd_dev)
	exten => s,n,SIPAddHeader(Call-AccHum: sip:\;accion=null)
	exten => s,n,SIPAddHeader(Call-AccMaq: sip:\;accion=null)
	exten => s,n,SIPAddHeader(Call-InfoCID: sip:\;contacto_id=${DY_MARCADOR_ID_CONTACTO})
	exten => s,n,SIPAddHeader(Call-InfoConsInte: sip:\;contacto_id=${DY_MARCADOR_CONSINTE})
	exten => s,n,SIPAddHeader(Call-Autocontestar: sip:\;autocontestado=true)
	exten => s,n,SIPAddHeader(Call-InfoTIP: sip:\;tipificacion=null)
	exten => s,n,Macro(Grabacion)
	exten => s,n,Set(__DatoAdicionalCIDName=${DY_MARCADOR_IDCLIENTE} - |${DY_MARCADOR_CONSINTE},${DY_MARCADOR_CONSINTE_CAMPAN_CRM}|- ${DY_MARCADOR_TELEFONO_MARCADO})
	exten => s,n,Set(CALLERID(num)=${DY_MARCADOR_TELEFONO_MARCADO})
	exten => s,n,NoOp(En produccion aqui va Goto a DyPMCampana_xxx - en dev hangup)
	exten => s,n,Hangup()
	exten => h,1,Hangup(${HANGUPCAUSE})

; Contexto ejemplo: Marcador con AMD (patron 2 de produccion — 22 de 57 campañas)
[DyCampanaMarcador_2]
	exten => s,1,Answer()
	exten => s,n,Playback(s200ms, m(10))
	exten => s,n,NOOP(Llamada marcador V1 ${DY_MARCADOR_OPCION} ${DY_MARCADOR_IDCLIENTE} ${DY_MARCADOR_TELEFONO_MARCADO} ${DY_MARCADOR_ID_CONTACTO} ${DY_MARCADOR_URL})
	exten => s,n,SIPAddHeader(Call-InfoCAM: sip:\;id_campana=2)
	exten => s,n,SIPAddHeader(Call-InfoURL1: sip:\;url=${DY_MARCADOR_URL1})
	exten => s,n,SIPAddHeader(Call-InfoURL2: sip:\;url=${DY_MARCADOR_URL2})
	exten => s,n,SIPAddHeader(Call-InfoURL3: sip:\;url=${DY_MARCADOR_URL3})
	exten => s,n,SIPAddHeader(Call-InfoURL4: sip:\;url=${DY_MARCADOR_URL4})
	exten => s,n,SIPAddHeader(Call-InfoURL5: sip:\;url=${DY_MARCADOR_URL5})
	exten => s,n,SIPAddHeader(Call-InfoUID: sip:\;uniqueid=${UNIQUEID})
	exten => s,n,SIPAddHeader(Call-AccDef: sip:\;accion=cola_acd_dev)
	exten => s,n,SIPAddHeader(Call-AccHum: sip:\;accion=cola_acd_dev)
	exten => s,n,SIPAddHeader(Call-AccMaq: sip:\;accion=null)
	exten => s,n,SIPAddHeader(Call-InfoCID: sip:\;contacto_id=${DY_MARCADOR_ID_CONTACTO})
	exten => s,n,SIPAddHeader(Call-InfoConsInte: sip:\;contacto_id=${DY_MARCADOR_CONSINTE})
	exten => s,n,SIPAddHeader(Call-Autocontestar: sip:\;autocontestado=true)
	exten => s,n,SIPAddHeader(Call-InfoTIP: sip:\;tipificacion=null)
	exten => s,n,Macro(Grabacion)
	exten => s,n,Set(__DatoAdicionalCIDName=${DY_MARCADOR_IDCLIENTE} - |${DY_MARCADOR_CONSINTE},${DY_MARCADOR_CONSINTE_CAMPAN_CRM}|- ${DY_MARCADOR_TELEFONO_MARCADO})
	exten => s,n,Set(CALLERID(num)=${DY_MARCADOR_TELEFONO_MARCADO})
	exten => s,n,NoOp(Iniciando AMD para campana de prueba)
	exten => s,n,AMD()
	exten => s,n,Noop(AMD RES => ${AMDSTATUS},${AMDCAUSE},${UNIQUEID})
	exten => s,n,GotoIf($["${AMDSTATUS}" = "HUMAN"]?humano,1)
	exten => s,n,GotoIf($["${AMDSTATUS}" = "NOTSURE"]?humano,1)
	exten => s,n,GotoIf($["${AMDSTATUS}" = "UNKNOWN"]?humano,1)
	exten => s,n,Noop(Maquina detectada para ${DY_MARCADOR_ID_CONTACTO})
	exten => s,n,Agi(${FASTAGI_DOTNET}/AGIClasificaAM.agi?idContacto=${DY_MARCADOR_ID_CONTACTO}&idCampan=1&accam=-1&valaccam=null)
	exten => s,n,Hangup(${HANGUPCAUSE})

	exten => humano,1,NoOp(Llamada contestada por un humano)
	exten => humano,n,Set(CALLERID(num)=${DY_MARCADOR_TELEFONO_MARCADO})
	exten => humano,n,Set(CALLERID(name)=${DY_MARCADOR_IDCLIENTE} - |${DY_MARCADOR_CONSINTE},${DY_MARCADOR_CONSINTE_CAMPAN_CRM}|- ${DY_MARCADOR_TELEFONO_MARCADO})
	exten => humano,n,NoOp(En produccion aqui va Goto a DyPMCampana_xxx - en dev hangup)
	exten => humano,n,Hangup()
	exten => h,1,Hangup(${HANGUPCAUSE})

; Macro de grabacion (stub para desarrollo)
[macro-Grabacion]
	exten => s,1,NoOp(Grabacion activada - stub en dev)
	exten => s,n,MacroExit()

[default]
	exten => _X.,1,NoOp(Default context: ${EXTEN})
	 same => n,Hangup()
