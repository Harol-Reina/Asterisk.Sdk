version: 2
updates:
  # .NET / NuGet dependencies (tracked via Directory.Packages.props)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # FluentAssertions 8.x switched to a commercial license — incompatible
      # with the SDK's MIT licensing. Pin to 7.x until a license strategy is decided.
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]
      # xunit.runner.visualstudio 3.x requires xunit v3; we're on xunit 2.9.x.
      # Revisit when migrating the test stack to xunit v3.
      - dependency-name: "xunit.runner.visualstudio"
        update-types: ["version-update:semver-major"]
      # coverlet.collector 10.x is a breaking jump from 6.x; review before adopting.
      - dependency-name: "coverlet.collector"
        update-types: ["version-update:semver-major"]
      # Microsoft.NET.Test.Sdk major bumps typically track xunit major bumps;
      # pin to 17.x until the xunit v3 migration is scheduled.
      - dependency-name: "Microsoft.NET.Test.Sdk"
        update-types: ["version-update:semver-major"]
      # Testcontainers 4.4+ deprecated `new ContainerBuilder()` (now requires
      # an image in the ctor) and removed `.UntilPortIsAvailable(port)` — migrating
      # the 5 custom containers under Tests/Asterisk.Sdk.TestInfrastructure/Containers/
      # is a dedicated sprint. Pin to 4.3.x until scheduled.
      - dependency-name: "Testcontainers"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    groups:
      # Group all Microsoft.Extensions.* bumps into a single PR.
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.CodeAnalysis.*"
      # Group all xunit/test-stack bumps together.
      test-stack:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "NSubstitute*"
          - "coverlet.*"
          - "Microsoft.NET.Test.Sdk"
      # Group analyzer bumps.
      analyzers:
        patterns:
          - "Meziantou.*"
          - "IDisposableAnalyzers"
          - "Microsoft.VisualStudio.Threading.Analyzers"

  # GitHub Actions used by workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
