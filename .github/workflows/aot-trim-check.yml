name: AOT Trim Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  aot-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Verify AOT trim safety
        run: bash tools/verify-aot.sh
