name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build Asterisk.Sdk.slnx -c Release
      - name: Run unit tests
        run: dotnet test Asterisk.Sdk.slnx --no-build -c Release --filter "Category!=Functional&Category!=Integration&Category!=Realtime" --logger "console;verbosity=normal"

  aot-check:
    name: AOT Trim Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Verify AOT trim safety
        run: bash tools/verify-aot.sh

  functional-tests:
    name: Functional Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run functional + integration tests
        run: dotnet test Asterisk.Sdk.slnx --filter "Category=Functional|Category=Integration|Category=Realtime" --logger "console;verbosity=detailed"
        timeout-minutes: 15
        continue-on-error: true
