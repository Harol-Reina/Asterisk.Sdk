name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build Asterisk.Sdk.slnx -c Release
      - name: Run unit tests
        run: dotnet test Asterisk.Sdk.slnx --no-build -c Release --filter "Category!=Functional&Category!=Integration&Category!=Realtime&Category!=Spike" --logger "console;verbosity=normal"

  aot-check:
    name: AOT Trim Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Verify AOT trim safety
        run: bash tools/verify-aot.sh

  pack-check:
    name: Pack Warnings Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Build Release
        run: dotnet build Asterisk.Sdk.slnx -c Release
      - name: Pack with warnings as errors
        # Surfaces PackageValidation baseline drift, PublicAPI drift, missing
        # icons/release-notes, and license-expression issues at PR time so
        # publish.yml never hits them in the release path.
        run: dotnet pack Asterisk.Sdk.slnx -c Release --no-build -p:TreatWarningsAsErrors=true -o ./artifacts
      - name: List produced packages
        run: ls -la ./artifacts/*.nupkg 2>/dev/null || true

  functional-tests:
    name: Functional Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Pre-pull Docker images and build Asterisk test image
        # Populate the Docker layer cache before tests run so container startups are fast.
        run: |
          docker pull postgres:18-alpine &
          docker pull ghcr.io/shopify/toxiproxy:2.12.0 &
          docker pull ctaloi/sipp &
          wait
          docker build -f docker/Dockerfile.asterisk docker/ -t asterisk-sdk-test-cache
      - name: Run functional + integration tests
        # MaxCpuCount=1 serializes test projects so FunctionalTests and IntegrationTests
        # do not start their Docker stacks concurrently (CI runner has limited resources).
        run: dotnet test Asterisk.Sdk.slnx --filter "Category=Functional|Category=Integration|Category=Realtime" --logger "console;verbosity=detailed" -- RunConfiguration.MaxCpuCount=1
        timeout-minutes: 30
